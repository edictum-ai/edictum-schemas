suite: effect-enums
version: 1
description: "Rules using effect values invalid for their rule type"

fixtures:
  - id: "rej-040"
    description: "Pre rule with effect 'warn' only valid for post rules"
    bundle:
      apiVersion: edictum/v1
      kind: Ruleset
      metadata:
        name: test-bundle
      defaults:
        mode: enforce
      rules:
        - id: c1
          type: pre
          tool: "*"
          when:
            args.x: { equals: 1 }
          then:
            action: warn
            message: "denied"
    expected:
      rejected: true
      error_contains: "action"

  - id: "rej-041"
    description: "Pre rule with effect 'redact' only valid for post rules"
    bundle:
      apiVersion: edictum/v1
      kind: Ruleset
      metadata:
        name: test-bundle
      defaults:
        mode: enforce
      rules:
        - id: c1
          type: pre
          tool: "*"
          when:
            args.x: { equals: 1 }
          then:
            action: redact
            message: "denied"
    expected:
      rejected: true
      error_contains: "action"

  - id: "rej-042"
    description: "Pre rule with effect 'allow' is not a valid effect value"
    bundle:
      apiVersion: edictum/v1
      kind: Ruleset
      metadata:
        name: test-bundle
      defaults:
        mode: enforce
      rules:
        - id: c1
          type: pre
          tool: "*"
          when:
            args.x: { equals: 1 }
          then:
            action: allow
            message: "denied"
    expected:
      rejected: true
      error_contains: "action"

  - id: "rej-043"
    description: "Post rule with effect 'approve' only valid for pre rules"
    bundle:
      apiVersion: edictum/v1
      kind: Ruleset
      metadata:
        name: test-bundle
      defaults:
        mode: enforce
      rules:
        - id: c1
          type: post
          tool: "*"
          when:
            result.status: { equals: "error" }
          then:
            action: ask
            message: "error detected"
    expected:
      rejected: true
      error_contains: "action"

  - id: "rej-044"
    description: "Session rule with effect 'warn' uses an invalid block action"
    bundle:
      apiVersion: edictum/v1
      kind: Ruleset
      metadata:
        name: test-bundle
      defaults:
        mode: enforce
      rules:
        - id: c1
          type: session
          limits:
            max_tool_calls: 10
          then:
            action: warn
            message: "limit exceeded"
    expected:
      rejected: true
      error_contains: "action"
