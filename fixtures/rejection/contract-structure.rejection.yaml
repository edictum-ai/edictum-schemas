  - id: "rej-028"
    description: "Sandbox contract missing both tool and tools fields"
    bundle:
      apiVersion: edictum/v1
      kind: ContractBundle
      metadata:
        name: test-bundle
      defaults:
        mode: enforce
      contracts:
        - id: c1
          type: sandbox
          within:
            - "/safe"
          message: "denied"
    expected:
      rejected: true
      error_contains: "tool"

  - id: "rej-029"
