      contracts:
        - id: c1
          type: pre
          tool: "*"
          when:
            args.x: { equals: 1 }
    expected:
      rejected: true
      error_contains: "then"

  - id: "rej-019"
    description: "Pre contract then block missing effect"
    bundle:
      apiVersion: edictum/v1
