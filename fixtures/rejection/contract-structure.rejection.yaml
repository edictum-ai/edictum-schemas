    bundle:
      apiVersion: edictum/v1
      kind: ContractBundle
      metadata:
        name: test-bundle
      defaults:
        mode: enforce
      contracts:
        - id: c1
          type: post
          when:
            result.status: { equals: "error" }
          then:
            effect: warn
            message: "error detected"
    expected:
      rejected: true
      error_contains: "tool"

  - id: "rej-022"
