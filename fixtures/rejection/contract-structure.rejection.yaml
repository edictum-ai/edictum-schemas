suite: contract-structure
version: 1
description: "Contracts with structural errors — missing or invalid fields within individual contracts"

fixtures:
  - id: "rej-010"
    description: "Contract missing id field"
    bundle:
      apiVersion: edictum/v1
      kind: ContractBundle
      metadata:
        name: test-bundle
      defaults:
        mode: enforce
      contracts:
        - type: pre
          tool: "*"
          when:
            args.x: { equals: 1 }
          then:
            effect: deny
            message: "denied"
    expected:
      rejected: true
      error_contains: "id"

  - id: "rej-011"
    description: "Contract id is empty string"
    bundle:
      apiVersion: edictum/v1
      kind: ContractBundle
      metadata:
        name: test-bundle
      defaults:
        mode: enforce
      contracts:
        - id: ""
          type: pre
          tool: "*"
          when:
            args.x: { equals: 1 }
          then:
            effect: deny
            message: "denied"
    expected:
      rejected: true
      error_contains: "id"

  - id: "rej-012"
    description: "Contract id with uppercase characters"
    bundle:
      apiVersion: edictum/v1
      kind: ContractBundle
      metadata:
        name: test-bundle
      defaults:
        mode: enforce
      contracts:
        - id: "UPPER-CASE"
          type: pre
          tool: "*"
          when:
            args.x: { equals: 1 }
          then:
            effect: deny
            message: "denied"
    expected:
      rejected: true
      error_contains: "id"

  - id: "rej-013"
    description: "Contract id with dots — only lowercase, digits, hyphens, underscores allowed"
    bundle:
      apiVersion: edictum/v1
      kind: ContractBundle
      metadata:
        name: test-bundle
      defaults:
        mode: enforce
      contracts:
        - id: "has.dot"
          type: pre
          tool: "*"
          when:
            args.x: { equals: 1 }
          then:
            effect: deny
            message: "denied"
    expected:
      rejected: true
      error_contains: "id"

  - id: "rej-014"
    description: "Contract missing type field"
    bundle:
      apiVersion: edictum/v1
      kind: ContractBundle
      metadata:
        name: test-bundle
      defaults:
        mode: enforce
      contracts:
        - id: c1
          tool: "*"
          when:
            args.x: { equals: 1 }
          then:
            effect: deny
            message: "denied"
    expected:
      rejected: true
      error_contains: "type"

  - id: "rej-015"
    description: "Contract with invalid type value"
    bundle:
      apiVersion: edictum/v1
      kind: ContractBundle
      metadata:
        name: test-bundle
      defaults:
        mode: enforce
      contracts:
        - id: c1
          type: rule
          tool: "*"
          when:
            args.x: { equals: 1 }
          then:
            effect: deny
            message: "denied"
    expected:
      rejected: true
      error_contains: "type"

  - id: "rej-016"
    description: "Pre contract missing tool field"
    bundle:
      apiVersion: edictum/v1
      kind: ContractBundle
      metadata:
        name: test-bundle
      defaults:
        mode: enforce
      contracts:
        - id: c1
          type: pre
          when:
            args.x: { equals: 1 }
          then:
            effect: deny
            message: "denied"
    expected:
      rejected: true
      error_contains: "tool"

  - id: "rej-017"
    description: "Pre contract missing when field"
    bundle:
      apiVersion: edictum/v1
      kind: ContractBundle
      metadata:
        name: test-bundle
      defaults:
        mode: enforce
      contracts:
        - id: c1
          type: pre
