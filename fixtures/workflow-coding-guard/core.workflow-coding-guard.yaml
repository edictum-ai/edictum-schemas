suite: workflow-coding-guard-core
version: 1
description: "Spec 017 P7 coding-guard workflow cases"

workflows:
  coding-guard:
    apiVersion: edictum/v1
    kind: Workflow
    metadata:
      name: coding-guard
      version: "2026-04-03"
    stages:
      - id: read-analyze
        description: "Read the task brief before coding"
        tools: [Read, Grep, Glob]
        exit:
          - condition: file_read("TASK.md")
            message: "Read TASK.md before coding"

      - id: create-branch
        description: "Create a working branch"
        entry:
          - condition: stage_complete("read-analyze")
        tools: [Bash]
        checks:
          - command_matches: "^git\\s+(switch|checkout|branch)\\b"
            message: "Only branch creation commands are allowed in create-branch"
        exit:
          - condition: command_matches("^git\\s+(switch|checkout|branch)\\b")
            message: "Create a working branch before baseline verification"

      - id: baseline-verify
        description: "Run baseline verification"
        entry:
          - condition: stage_complete("create-branch")
        tools: [Read, Grep, Bash]
        checks:
          - command_matches: "^pytest$"
            message: "Only pytest is allowed in baseline-verify"
        exit:
          - condition: command_matches("^pytest$")
            message: "Run pytest successfully before implementation"

      - id: implement
        description: "Write the code changes"
        entry:
          - condition: stage_complete("baseline-verify")
        tools: [Read, Grep, Edit, Write, Bash]
        checks:
          - command_not_matches: "^pytest$"
            message: "Verification commands belong in local-verify"
          - command_not_matches: "^git\\s+(add|commit|push)\\b"
            message: "No git add/commit/push during implementation"

      - id: local-verify
        description: "Run local verification"
        entry:
          - condition: stage_complete("implement")
        tools: [Read, Grep, Bash]
        checks:
          - command_matches: "^pytest$"
            message: "Only pytest is allowed in local-verify"
          - command_not_matches: "^git\\s+(add|commit|push)\\b"
            message: "No git add/commit/push during verification"
        exit:
          - condition: command_matches("^pytest$")
            message: "Run pytest successfully before external review"

      - id: external-review
        description: "Pause for external review"
        entry:
          - condition: stage_complete("local-verify")
        tools: [Read, Grep, Bash]
        checks:
          - command_matches: "^git\\s+(status|diff|show|log)\\b"
            message: "Only review-safe git commands are allowed in external-review"
        exit:
          - condition: command_matches("^git\\s+(status|diff|show|log)\\b")
            message: "Review the diff before approval"
        approval:
          message: "Approve only after external review confirms the implementation"

      - id: docs-update
        description: "Update docs if needed"
        entry:
          - condition: stage_complete("external-review")
        tools: [Read, Grep, Edit, Write]

      - id: push-pr
        description: "Commit, push, and open a PR"
        entry:
          - condition: stage_complete("docs-update")
        tools: [Bash]
        checks:
          - command_matches: "^(git\\s+(status|diff|add|commit|push)\\b|gh\\s+pr\\s+(create|edit|view)\\b)"
            message: "Only git and gh pr commands are allowed in push-pr"
          - command_not_matches: "^git\\s+push\\b.*\\bmain\\b"
            message: "Push to a branch, not main"
        exit:
          - condition: command_matches("^git\\s+push\\b")
            message: "Push the branch before waiting for CI"
          - condition: command_not_matches("^git\\s+push\\b.*\\bmain\\b")
            message: "Push to a branch, not main"

      - id: ci-green
        description: "Wait for CI to pass"
        entry:
          - condition: stage_complete("push-pr")
        tools: [Bash]
        checks:
          - command_matches: "^(gh\\s+(run|pr\\s+checks)|curl)\\b"
            message: "Only CI status check commands are allowed in ci-green"
        exit:
          - condition: command_matches("^gh\\s+pr\\s+checks\\b")
            message: "Confirm CI is green before completion"

      - id: done
        description: "Write the concise completion summary"
        entry:
          - condition: stage_complete("ci-green")
        tools: [Write]

