suite: workflow-adapter-conformance-core
version: 1
description: "Spec 017 P6 workflow adapter audit, lineage, and recording cases"

workflows:
  dev-loop:
    apiVersion: edictum/v1
    kind: Workflow
    metadata:
      name: dev-loop
      version: "2026-04-04"
    stages:
      - id: read-analyze
        description: "Read the P6 reference before editing"
        tools: [Read]
        exit:
          - condition: file_read("specs/017.md")
            message: "Read specs/017.md before editing"

      - id: implement
        description: "Make the fixture changes"
        entry:
          - condition: stage_complete("read-analyze")
        tools: [Edit]

      - id: local-verify
        description: "Run local verification"
        entry:
          - condition: stage_complete("implement")
        tools: [Bash]
        checks:
          - command_matches: "^pytest$"
            message: "Only pytest is allowed in local-verify"
        exit:
          - condition: command_matches("^pytest$")
            message: "Run pytest successfully before local review"

      - id: local-review
        description: "Pause for approval"
        entry:
          - condition: stage_complete("local-verify")
        approval:
          message: "Approve after reviewing the diff and pytest output"

      - id: commit-push
        description: "Push the review-approved branch"
        entry:
          - condition: stage_complete("local-review")
        tools: [Bash]
        checks:
          - command_matches: "^git push origin feat/017-p6-workflow-conformance-fixtures$"
            message: "Only the review-approved branch push is allowed"

  double-review-loop:
    apiVersion: edictum/v1
    kind: Workflow
    metadata:
      name: double-review-loop
      version: "2026-04-04"
    stages:
      - id: local-review
        description: "Pause for local review approval"
        approval:
          message: "Approve after local review"

      - id: release-review
        description: "Pause for release review approval"
        entry:
          - condition: stage_complete("local-review")
        approval:
          message: "Approve after release review"

      - id: commit-push
        description: "Push the release-approved branch"
        entry:
          - condition: stage_complete("release-review")
        tools: [Bash]
        checks:
          - command_matches: "^git push origin feat/017-p6-workflow-conformance-fixtures$"
            message: "Only the release-approved branch push is allowed"

  context-coverage:
    apiVersion: edictum/v1
    kind: Workflow
    metadata:
      name: context-coverage
      version: "2026-04-04"
    stages:
      - id: implement
        description: "Stay in a single stage so event context is easy to compare"
        tools: [Edit]
        exit:
          - condition: file_read("never.txt")
            message: "This stage does not auto-advance during the fixture"

