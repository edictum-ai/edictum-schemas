suite: precondition-allow
version: 1
description: "Precondition rules that allow tool calls"

fixtures:
  - id: "pre-allow-001"
    description: "Tool call with no matching rule is allowed"

    contract:
      apiVersion: edictum/v1
      kind: Ruleset
      metadata:
        name: test-bundle
      defaults:
        mode: enforce
      rules:
        - id: block-rm
          type: pre
          tool: "Bash"
          when:
            args.command:
              contains: "rm -rf"
          then:
            action: block
            message: "Cannot run rm -rf"

    envelope:
      tool_name: "Read"
      arguments:
        file_path: "/tmp/safe.txt"

    expected:
      verdict: allowed

  - id: "pre-allow-002"
    description: "Matching tool but when condition evaluates false is allowed"

    contract:
      apiVersion: edictum/v1
      kind: Ruleset
      metadata:
        name: test-bundle
      defaults:
        mode: enforce
      rules:
        - id: block-rm
          type: pre
          tool: "Bash"
          when:
            args.command:
              contains: "rm -rf"
          then:
            action: block
            message: "Cannot run rm -rf"

    envelope:
      tool_name: "Bash"
      arguments:
        command: "ls -la /tmp"

    expected:
      verdict: allowed

  - id: "pre-allow-003"
    description: "Approve effect explicitly allows matching call"

    contract:
      apiVersion: edictum/v1
      kind: Ruleset
      metadata:
        name: test-bundle
      defaults:
        mode: enforce
      rules:
        - id: allow-safe-reads
          type: pre
          tool: "Bash"
          when:
            args.command:
              starts_with: "cat "
          then:
            action: ask
            message: "Read operations are approved"

    envelope:
      tool_name: "Bash"
      arguments:
        command: "cat /tmp/log.txt"

    expected:
      verdict: allowed
