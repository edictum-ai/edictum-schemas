suite: workflow-v0.18-extends-inheritance
version: 1
description: "v0.18 extends: ruleset inheritance"

# Format extension for this file:
#
# A top-level `rulesets:` section defines named Ruleset documents.
# A fixture's `contract:` field may be either an inline Ruleset object
# (existing format) or a string name referencing an entry in `rulesets:`.
#
# When `contract:` is a string, runtimes must:
#   1. Look up the named ruleset in `rulesets:`.
#   2. Resolve the `extends:` field by merging the parent's rules BEFORE the
#      child's rules. The child's rules evaluate after the parent's rules.
#   3. Evaluate the merged ruleset against the fixture envelope.
#
# Rule ordering after merge: parent rules first, child rules after.
# A child rule that blocks does not suppress a parent rule that also blocks;
# both are independently evaluated.

rulesets:
  base-security:
    apiVersion: edictum/v1
    kind: Ruleset
    metadata:
      name: base-security
    defaults:
      mode: enforce
    rules:
      - id: block-push-main
        type: pre
        tool: Bash
        when:
          args.command:
            matches: "^git push.*\\bmain\\b"
        then:
          action: block
          message: "Push to main is blocked by base policy"

  extended-security:
    apiVersion: edictum/v1
    kind: Ruleset
    metadata:
      name: extended-security
    extends: base-security
    defaults:
      mode: enforce
    rules:
      - id: block-force-push
        type: pre
        tool: Bash
        when:
          args.command:
            matches: "^git push --force"
        then:
          action: block
          message: "Force push is blocked by extended policy"

  override-mode:
    apiVersion: edictum/v1
    kind: Ruleset
    metadata:
      name: override-mode
    extends: base-security
    defaults:
      mode: observe
    rules: []

fixtures:
  - id: ex-001
    description: "child ruleset inherits parent rule: push to main is blocked"
    contract: extended-security
    envelope:
      tool_name: Bash
      arguments:
        command: "git push origin main"
    expected:
      verdict: denied
      message_contains: "base policy"

  - id: ex-002
    description: "child ruleset's own rule is enforced independently of parent"
    contract: extended-security
    envelope:
      tool_name: Bash
      arguments:
        command: "git push --force origin feat/wip"
    expected:
      verdict: denied
      message_contains: "extended policy"

  - id: ex-003
    description: "call that matches neither parent nor child rule is allowed"
    contract: extended-security
    envelope:
      tool_name: Bash
      arguments:
        command: "git push origin feat/wip"
    expected:
      verdict: allowed

  - id: ex-004
    description: "parent ruleset alone does not enforce child-only rule"
    contract: base-security
    envelope:
      tool_name: Bash
      arguments:
        command: "git push --force origin feat/wip"
    expected:
      verdict: allowed

  - id: ex-005
    description: "child can override parent defaults: observe mode does not block"
    contract: override-mode
    envelope:
      tool_name: Bash
      arguments:
        command: "git push origin main"
    expected:
      verdict: allowed
