name: PR Title

on:
  pull_request:
    types: [opened, edited, synchronize]

permissions:
  pull-requests: read

jobs:
  validate:
    runs-on: blacksmith-2vcpu-ubuntu-2404-arm
    steps:
      - uses: amannn/action-semantic-pull-request@e32d7e603df1aa1ba07e981f2a23455dee596825 # v5
        with:
          types: |
            feat
            fix
            docs
            test
            refactor
            chore
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
