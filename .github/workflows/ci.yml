name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-schema:
    runs-on: blacksmith-4vcpu-ubuntu-2404-arm
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"

      - name: Validate JSON is parseable
        run: node --input-type=module -e "import { readFileSync } from 'fs'; JSON.parse(readFileSync('schemas/edictum-v1.schema.json', 'utf8'));"

      - name: Validate JSON Schema structure
        run: |
          npx ajv-cli@5 compile -s schemas/edictum-v1.schema.json --spec=draft2020

  test-python:
    runs-on: blacksmith-4vcpu-ubuntu-2404-arm
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: astral-sh/setup-uv@0c5e2b8115b80b4c7c5ddf6ffdd634974642d182 # v4

      - name: Run tests
        run: uv run --with pytest pytest tests/ -v
