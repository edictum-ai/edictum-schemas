name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate-schema:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Validate JSON is parseable
        run: node --input-type=module -e "import { readFileSync } from 'fs'; JSON.parse(readFileSync('schemas/edictum-v1.schema.json', 'utf8'));"

      - name: Validate JSON Schema structure
        run: |
          npx ajv-cli@5 compile -s schemas/edictum-v1.schema.json --spec=draft2020

  test-python:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4

      - name: Run tests
        run: uv run --with pytest pytest tests/ -v
